<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HealthyPulse BMI Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card-container">
    <h1>HealthyPulse Wellness Card</h1>
    <p class="first" style = "color: white;">Enter your details to calculate your Body Mass Index (BMI) and understand your health status.</p>
    
    <form id="bmi-form">
      <label for="weight">Weight (kg):</label>
      <input type="number" id="weight" placeholder="e.g., 70" step="0.1" min="1" required>
      
      <label for="height">Height (cm):</label>
      <input type="number" id="height" placeholder="e.g., 175" step="0.1" min="1" required>
      
      <button type="submit" id="calculate-btn">Calculate BMI</button>
    </form>

    <div id="result-card" class="result-card hidden">
      <h2 id="bmi-value"></h2>
      <p id="bmi-category"></p>
      <p id="bmi-message"></p>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
